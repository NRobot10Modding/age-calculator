<!DOCTYPE html>
<html lang="en">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<head>
	<title>Age Calculator</title>
	<link rel="icon" type="image/x-icon" href="./images/favicon.ico">
	<link rel="stylesheet" href="./style.css">
	<script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>

</head>
<body>
	<div class="content" name="content">
		<h1>Age Calculator</h1>
		<h2>By roboman</h2><br>
		<hr><br><br>
		<label for="dayIn">Day:</label>
		<input type="text" id="dayIn" name="dayIn"><br>
		<div id="dayError"></div><br>
		<label for="monIn">Month:</label>
		<input type="text" id="monIn" name="monIn"><br>
		<div id="monError"></div><br>
		<label for="yearIn">Year:</label>
		<input type="text" id="yearIn" name="yearIn"><br>
		<div id="yearError"></div><br>
		<button py-click="run" id="goButton">Calculate</button><br><br>
		<script type="py" src="./age.py"></script>
		<div class="output" id="outputField"></div>
	</div>
	<footer>
		<a href="https://github.com/nrobot10modding/age-calculator">GitHub Repo</a>
	</footer>
</body>
